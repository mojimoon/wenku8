name: Generate EPUBs

on:
  schedule:
    # 每天北京时间 8:00 (UTC 0:00) 运行
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: '强制重新生成所有'
        type: boolean
        default: false
      limit:
        description: '限制处理数量（0=无限制）'
        type: number
        default: 3
      scraper:
        description: '爬虫模式'
        type: choice
        options:
          - auto
          - steel
          - playwright
          - requests
        default: auto

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps
      - name: Generate EPUBs
        id: gen
        env:
          WENKU8_COOKIE: ${{ secrets.WENKU8_COOKIE }}
          STEEL_API_KEY: ${{ secrets.STEEL_API_KEY }}
        run: |
          FORCE_FLAG=""
          LIMIT_FLAG=""
          SCRAPER_FLAG="--scraper auto"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ inputs.force }}" = "true" ]; then
              FORCE_FLAG="--force"
            fi
            if [ "${{ inputs.limit }}" != "" ] && [ "${{ inputs.limit }}" != "0" ]; then
              LIMIT_FLAG="--limit ${{ inputs.limit }}"
            fi
            SCRAPER_FLAG="--scraper ${{ inputs.scraper }}"
          else
            # 定期运行时: 检查最近 3 本
            LIMIT_FLAG="--limit 3"
          fi

          python gen_epub.py $FORCE_FLAG $LIMIT_FLAG $SCRAPER_FLAG

          # 读取生成数量
          COUNT=$(python -c "import json; d=json.load(open('out/epub_summary.json')); print(len(d.get('generated',[])))" 2>/dev/null || echo 0)
          echo "epub_count=${COUNT}" >> $GITHUB_OUTPUT

          # 输出生成列表
          if [ "$COUNT" = "0" ]; then
            echo "无更新内容，跳过生成。" >> $GITHUB_STEP_SUMMARY
          else
            echo "### 本次生成 EPUB" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            python -c "import json;d=json.load(open('out/epub_summary.json'));[print(f'- **{g[\"title\"]}** (v{g[\"epub_version\"]}) — {g[\"author\"]}') for g in d.get('generated',[])]" >> $GITHUB_STEP_SUMMARY
          fi



      - name: Upload EPUBs to Release
        if: steps.gen.outputs.epub_count != '0'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: epub-${{ github.run_id }}
          name: "EPUBs - ${{ github.event.repository.updated_at }}"
          body: |
            ## 📚 自动生成的 EPUB 轻小说

            **生成时间**: ${{ github.event.head_commit.timestamp || github.event.repository.updated_at }}
            **本次数量**: ${{ steps.gen.outputs.epub_count }} 本

            内容来源：轻小说文库 (wenku8.net)，仅供学习交流使用。

            ### 下载与阅读

            所有 EPUB 兼容 **Kindle、Calibre、Apple Books、多看** 等主流阅读器。

            ### 镜像加速

            如 GitHub 下载缓慢，可在 Release 资源链接前添加：
            - `https://ghproxy.net/` 或 `https://ghfast.top/`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit state file
        if: steps.gen.outputs.epub_count != '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add out/epub_state.json
          git diff --staged --quiet || git commit -m "chore: update epub state [skip ci]"
          git push
